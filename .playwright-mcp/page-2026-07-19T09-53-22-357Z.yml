        - generic [ref=f1e51]:
          - heading "Project Scope" [level=3] [ref=f1e52]
          - paragraph [ref=f1e53]:
            - text: The
            - strong [ref=f1e54]: PAI-18P/A/2022
            - text: Project’s scope of work includes Design, Execution, Completion & Maintenance of Al-Shadadiya Industrial Zone Infrastructure. The Shadadiya Industrial Zone Infrastructure Works project encompasses the full development of essential services and networks required to support a modern industrial district. The scope includes large-scale earthworks, construction of internal roadways, grading, and preparation of industrial plots.
          - paragraph [ref=f1e55]: UGCC executed comprehensive utilities installation, including stormwater drainage, sewer networks, potable water systems, firefighting lines, street lighting, and electrical/telecommunication duct banks.The project also includes the construction of culverts, manholes, chambers, and other infrastructure needed to ensure efficient service distribution across the zone.
          - paragraph [ref=f1e56]: Through precise engineering, high-quality materials, and advanced construction practices, the Shadadiya Industrial Zone is being prepared to accommodate future industrial operations and support Kuwait’s long-term economic development.
