# Netlify config for the UGCC static preview.
# Publishes the repo root as-is (no build step). Apache/Hostinger ignores this
# file, so it only affects Netlify deploys.

[build]
  publish = "."
  command = ""

# Keep the client preview out of search engines (free Netlify has no password).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Chatbot serverless function (dependency-free; native fetch to OpenAI).
[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Friendly same-origin endpoint for the widget.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Caching for static assets. Images are immutable: exported filenames are
# content-hashed, and curated v2/ files are only ever ADDED under new names,
# never edited in place (repo rule — editing one in place would be invisible
# to returning visitors for a year). CSS/JS get a week: the v2-era files use
# ?v= versioning, but main.css/custom.css/fonts.css/main.js are referenced
# unversioned across all pages, so a year-long immutable would be unsafe.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
