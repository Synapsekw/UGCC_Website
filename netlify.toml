# Netlify config for the UGCC static preview.
# Publishes the repo root as-is (no build step). Apache/Hostinger ignores this
# file, so it only affects Netlify deploys.

[build]
  publish = "."
  command = ""

# Keep the client preview out of search engines (free Netlify has no password).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Chatbot serverless function (dependency-free; native fetch to OpenAI).
[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Friendly same-origin endpoint for the widget.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Phase 2: the 16 legacy project listing pages were retired in favour of the
# filterable hub. Each 301s to the equivalent hub filter state so the indexed
# URLs keep their link equity. Note Netlify drops the fragment unless it is
# part of the destination — it is, so the hub's deep-link handler picks it up.
[[redirects]]
  from = "/all-projects-new"
  to = "/construction-projects-kuwait"
  status = 301
  force = true

[[redirects]]
  from = "/all-project-current"
  to = "/construction-projects-kuwait#current"
  status = 301
  force = true

[[redirects]]
