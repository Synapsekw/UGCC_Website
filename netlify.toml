# Netlify config for the UGCC static preview.
# Publishes the repo root as-is (no build step). Apache/Hostinger ignores this
# file, so it only affects Netlify deploys.

[build]
  publish = "."
  command = ""

# Keep the client preview out of search engines (free Netlify has no password).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Chatbot serverless function (dependency-free; native fetch to OpenAI).
[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Friendly same-origin endpoint for the widget.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Long-lived immutable caching for fingerprinted/versioned static assets.
# Image filenames are content-hashed (Hostinger export) or curated v2/ files
# that only change alongside a page edit; CSS/JS use ?v= query versioning.
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
